# Read the Docs configuration
# See https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
# Use python.install (runs in build venv) instead of post_checkout
python:
  install:
    - requirements: docs/requirements-docs.txt
    - method: pip
      path: .
      extra_requirements:
        - viz
# MkDocs config must be top-level (required as of 2025)
mkdocs:
  configuration: mkdocs.yml

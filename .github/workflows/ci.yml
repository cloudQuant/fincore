name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,viz]"
          pip install -r requirements-test.txt

      - name: Run tests
        run: |
          pytest tests/ -x -q --tb=short -m "not slow and not integration and not serial" --ignore=tests/benchmarks/ -n auto
          pytest tests/ -x -q --tb=short -m "serial" --ignore=tests/benchmarks/ -n 0

      - name: Run tests with coverage (Ubuntu + Python 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          pytest tests/ -x -q --tb=short -m "not slow and not integration and not serial" --ignore=tests/benchmarks/ -n auto --cov=fincore --cov-report=xml --cov-report=term-missing --cov-fail-under=60
          pytest tests/ -x -q --tb=short -m "serial" --ignore=tests/benchmarks/ -n 0 --cov=fincore --cov-append --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check fincore/ tests/ scripts/ examples/ benchmarks/ --output-format=github

      - name: Ruff format (check)
        run: ruff format --check fincore/ tests/ scripts/ examples/ benchmarks/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Bandit security scan
        run: bandit -r fincore/ -c pyproject.toml

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: mypy (selected modules)
        run: |
          python -m mypy fincore/core fincore/constants fincore/metrics fincore/plugin fincore/data fincore/optimization fincore/attribution fincore/report fincore/risk fincore/simulation fincore/utils fincore/viz fincore/empyrical.py fincore/tearsheets fincore/pyfolio.py --ignore-missing-imports

      - name: compileall (syntax check)
        run: |
          python -m compileall -q fincore

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
